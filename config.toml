# --------------------------------------------
# DISPLAY CONFIGURATION
# --------------------------------------------

[display]
# Most new Waveshare are 2, older ones are 1 (SKU: 13504)
# For 7.5 inch B with Red, use "2B" (SKU: 13505)
waveshare_version = "2"

# Which layout to use. 1, 2, 3...
screen_output_layout = 1

# Hour (0-23) for daily full-screen refresh.
full_refresh_hour = 2

# -------------------------------------------
# WEATHER CONFIGURATION
# -------------------------------------------

[weather]
enabled           = true  # Set to false to disable weather entirely
latitude          = 51.5077
longitude         = -0.1278
format            = "CELSIUS"  # or FAHRENHEIT
cache_ttl_seconds = 3600

[weather.provider]
type    = "metoffice"
api_key = "eyj..."

# Other providers
# Uncomment one of these blocks instead of the MetOffice config above.
# You can only have one [weather.provider] section active.

# AccuWeather (requires API key and location key)
# [weather.provider]
# type         = "accuweather"
# api_key      = "your-accuweather-api-key"
# location_key = "your-location-key"

# Met.no (Norway, no key required, just email for self-ID)
# [weather.provider]
# type                = "metno"
# self_identification = "you@example.com"

# Met Eireann (Ireland, no key required)
# [weather.provider]
# type    = "met_eireann"

# Weather.gov (USA, email for self-ID)
# [weather.provider]
# type                = "weathergov"
# self_identification = "you@example.com"

# SMHI (Sweden, email for self-ID)
# [weather.provider]
# type                = "smhi"
# self_identification = "you@example.com"

# OpenWeatherMap (requires API key)
# [weather.provider]
# type    = "openweathermap"
# api_key = "your-openweathermap-api-key"

# Visual Crossing (requires API key)
# [weather.provider]
# type    = "visualcrossing"
# api_key = "your-visualcrossing-api-key"

# -------------------------------------------
# ALERTS CONFIGURATION
# -------------------------------------------

[alerts]
enabled           = true  # Set to false to disable alerts entirely
cache_ttl_seconds = 3600

[alerts.provider]
# TOML enforces exactly one [alerts.provider] table.
# If you uncomment another provider block below, delete or comment this one.
type     = "metoffice"
feed_url = "https://www.metoffice.gov.uk/..."

# Other providers
# Uncomment one of these blocks instead of the MetOffice config above.
# You can only have one [alerts.provider] section active.

# Met Eireann (Ireland, use FIPS region code)
# [alerts.provider]
# type     = "met_eireann"
# feed_url = "https://www.met.ie/Open_Data/json/warning_EI07.json"

# Weather.gov (USA, requires email for self-ID)
# [alerts.provider]
# type                = "weathergov"
# self_identification = "you@example.com"

# --------------------------------------------
# CALENDAR CONFIGURATION
# --------------------------------------------

[calendar]
cache_ttl_seconds             = 3600
max_events                    = 10
include_past_events_for_today = false

# Google Calendar ID, you can get this from Google Calendar Settings
# The [[double brackets]] are important for calendars!
[[calendar.providers.google]]
enabled   = false
id        = "ee0b5..."
time_zone = "Asia/Kuala_Lumpur"

[[calendar.providers.google]]
enabled = true
id      = "921w"

# If you use Outlook Calendar, use python3 outlook_util.py to get available Calendar IDs
[[calendar.providers.outlook]]
enabled     = true
calendar_id = "AQMkADAwATM0MDAAMS1h"

[[calendar.providers.ics]]
enabled = true
url     = "https://example.com/calendar.ics"

[[calendar.providers.caldav]]
enabled  = false
url      = "https://example.com/caldav"
username = "example"
password = "example"
id       = "12345"


# ---------------------------------------------
# OTHER CONFIGURATION
# ---------------------------------------------

[privacy]
# Privacy mode. Just displays an XKCD comic or literature clock instead.
xkcd             = false
# Privacy mode. Just displays an XKCD comic or literature clock instead.
literature_clock = false

[locale]
# If you set a language, ensure it's installed first. Run `locale -a`
language = ""

# You can set this to DEBUG for troubleshooting, otherwise leave it at INFO.
log_level = "INFO"
